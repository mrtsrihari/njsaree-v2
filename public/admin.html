<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — NJ Saree Drapist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A227;
      --gold-light: #E2C561;
      --gold-dark: #A68518;
      --ivory: #FAF7F2;
      --black: #1A1A1A;
      --black-light: #2D2D2D;
      --white: #FFFFFF;
      --text-secondary: #6B6B6B;
      --text-light: #999;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'Poppins', sans-serif;
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--ivory);
      color: var(--black);
      min-height: 100vh;
    }

    /* ─── Login Screen ─── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1A1A1A 0%, #2D1F0E 50%, #1A1A1A 100%);
    }

    .login-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }

    .login-logo {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .login-field {
      margin-bottom: 18px;
    }

    .login-field input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border var(--transition);
    }

    .login-field input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .login-field input:focus {
      border-color: var(--gold);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--black);
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 20px rgba(201,162,39,0.3);
      margin-top: 8px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201,162,39,0.4);
    }

    .login-error {
      color: #E74C3C;
      font-size: 0.82rem;
      margin-top: 14px;
      min-height: 20px;
    }

    /* ─── Dashboard ─── */
    .dashboard { display: none; }
    .dashboard.active { display: block; }
    .login-screen.hidden { display: none; }

    .dash-header {
      background: var(--black);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.15);
    }

    .dash-brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .dash-brand-name {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
    }

    .dash-brand-tag {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .dash-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .dash-link {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      transition: color var(--transition);
    }

    .dash-link:hover { color: var(--gold); }

    .btn-logout {
      padding: 8px 20px;
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      font-family: var(--font-body);
      font-size: 0.78rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-logout:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .dash-body {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .dash-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      border: 1px solid rgba(201,162,39,0.08);
    }

    .stat-number {
      font-family: var(--font-heading);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .dash-section-title {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--black);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      background: var(--gold);
      color: var(--black);
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
    }

    /* Review cards */
    .review-list { margin-bottom: 48px; }

    .admin-review-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      border: 1px solid rgba(201,162,39,0.08);
      display: flex;
      gap: 20px;
      align-items: flex-start;
      transition: all var(--transition);
    }

    .admin-review-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .review-info { flex: 1; }

    .review-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .review-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .review-stars-display {
      color: var(--gold);
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .review-status {
      font-size: 0.68rem;
      padding: 3px 10px;
      border-radius: 50px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .status-pending {
      background: #FFF3CD;
      color: #856404;
    }

    .status-approved {
      background: #D4EDDA;
      color: #155724;
    }

    .review-msg {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 8px;
      font-style: italic;
    }

    .review-date {
      font-size: 0.72rem;
      color: var(--text-light);
    }

    .review-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-action {
      padding: 8px 18px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: 0.5px;
    }

    .btn-approve {
      background: #27AE60;
      color: var(--white);
    }

    .btn-approve:hover {
      background: #219A52;
      transform: translateY(-1px);
    }

    .btn-delete {
      background: none;
      border: 1px solid #E74C3C;
      color: #E74C3C;
    }

    .btn-delete:hover {
      background: #E74C3C;
      color: var(--white);
      transform: translateY(-1px);
    }

    .empty-msg {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--white);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      z-index: 9999;
      opacity: 0;
      transform: translateY(20px);
      transition: all var(--transition);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { background: #27AE60; }
    .toast.error { background: #E74C3C; }

    @media (max-width: 768px) {
      .dash-stats { grid-template-columns: 1fr; }
      .admin-review-card { flex-direction: column; }
      .review-actions { align-self: flex-end; }
      .dash-header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
      .login-card { margin: 20px; padding: 36px 28px; }
    }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">NJ Saree Drapist</div>
      <div class="login-subtitle">Admin Panel</div>
      <form id="loginForm">
        <div class="login-field">
          <input type="text" id="loginUser" placeholder="Username" autocomplete="username" required>
        </div>
        <div class="login-field">
          <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">Sign In</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <header class="dash-header">
      <div class="dash-brand">
        <span class="dash-brand-name">NJ Saree Drapist</span>
        <span class="dash-brand-tag">Admin</span>
      </div>
      <div class="dash-actions">
        <a href="/" class="dash-link">← View Site</a>
        <button class="btn-logout" id="btnLogout">Logout</button>
      </div>
    </header>

    <div class="dash-body">
      <div class="dash-stats">
        <div class="stat-card">
          <div class="stat-number" id="statPending">0</div>
          <div class="stat-label">Pending Reviews</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statApproved">0</div>
          <div class="stat-label">Approved</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="statTotal">0</div>
          <div class="stat-label">Total</div>
        </div>
      </div>

      <div class="dash-section-title">
        Pending Reviews <span class="badge" id="pendingBadge">0</span>
      </div>
      <div class="review-list" id="pendingList"></div>

      <div class="dash-section-title">All Reviews</div>
      <div class="review-list" id="allReviewsList"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TOKEN_KEY = 'nj_admin_token';

    // ─── DOM refs ───
    const loginForm = document.getElementById('loginForm');
    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('dashboard');
    const loginError = document.getElementById('loginError');

    // Get stored token
    function getToken() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    // Build auth header
    function authHeaders() {
      return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' };
    }

    // ─── Auto-login on page load ───
    (async function checkSession() {
      const token = getToken();
      if (!token) return;

      try {
        const res = await fetch('/api/admin/reviews', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.ok) {
          window.location.href = '/admin-dashboard';
        } else {
          sessionStorage.removeItem(TOKEN_KEY);
        }
      } catch {
        sessionStorage.removeItem(TOKEN_KEY);
      }
    })();

    // ─── Login ───
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.textContent = '';

      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          sessionStorage.setItem(TOKEN_KEY, data.token);
          window.location.href = '/admin-dashboard';
        } else {
          loginError.textContent = 'Invalid credentials. Please try again.';
        }
      } catch (err) {
        loginError.textContent = 'Connection error. Please try again.';
      }
    });

    // ─── Logout ───
    document.getElementById('btnLogout').addEventListener('click', async () => {
      try {
        await fetch('/api/admin/logout', {
          method: 'POST',
          headers: authHeaders()
        });
      } catch { /* ignore */ }

      sessionStorage.removeItem(TOKEN_KEY);
      loginScreen.classList.remove('hidden');
      dashboard.classList.remove('active');
      document.getElementById('loginUser').value = '';
      document.getElementById('loginPass').value = '';
      loginError.textContent = '';
    });

    // ─── Load Dashboard ───
    async function loadDashboard() {
      try {
        const res = await fetch('/api/admin/reviews', {
          headers: authHeaders()
        });
        const data = await res.json();

        if (!data.success) return;

        const reviews = data.reviews;
        const pending = reviews.filter(r => !r.approved);
        const approved = reviews.filter(r => r.approved);

        document.getElementById('statPending').textContent = pending.length;
        document.getElementById('statApproved').textContent = approved.length;
        document.getElementById('statTotal').textContent = reviews.length;
        document.getElementById('pendingBadge').textContent = pending.length;

        renderReviews('pendingList', pending, true);
        renderReviews('allReviewsList', reviews, false);
      } catch (err) {
        showToast('Failed to load reviews', 'error');
      }
    }

    function renderReviews(containerId, reviews, showApprove) {
      const container = document.getElementById(containerId);

      if (reviews.length === 0) {
        container.innerHTML = '<div class="empty-msg">No reviews to display.</div>';
        return;
      }

      container.innerHTML = reviews.map(r => `
        <div class="admin-review-card" id="review-${r.id}">
          <div class="review-info">
            <div class="review-meta">
              <span class="review-name">${escapeHtml(r.name)}</span>
              <span class="review-stars-display">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
              <span class="review-status ${r.approved ? 'status-approved' : 'status-pending'}">${r.approved ? 'Approved' : 'Pending'}</span>
            </div>
            <p class="review-msg">"${escapeHtml(r.message)}"</p>
            <div class="review-date">${new Date(r.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })}</div>
          </div>
          <div class="review-actions">
            ${!r.approved ? `<button class="btn-action btn-approve" onclick="approveReview(${r.id})">✓ Approve</button>` : ''}
            <button class="btn-action btn-delete" onclick="deleteReview(${r.id})">✕ Delete</button>
          </div>
        </div>
      `).join('');
    }

    // ─── Actions ───
    async function approveReview(id) {
      try {
        const res = await fetch(`/api/admin/reviews/${id}/approve`, {
          method: 'POST',
          headers: authHeaders()
        });
        const data = await res.json();
        if (data.success) {
          showToast('Review approved ✓', 'success');
          loadDashboard();
        } else {
          showToast('Failed to approve review', 'error');
        }
      } catch (err) {
        showToast('Network error', 'error');
      }
    }

    async function deleteReview(id) {
      if (!confirm('Are you sure you want to delete this review?')) return;
      try {
        const res = await fetch(`/api/admin/reviews/${id}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        const data = await res.json();
        if (data.success) {
          showToast('Review deleted', 'success');
          loadDashboard();
        } else {
          showToast('Failed to delete review', 'error');
        }
      } catch (err) {
        showToast('Network error', 'error');
      }
    }

    // ─── Toast ───
    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type;
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function escapeHtml(text) {
      const el = document.createElement('span');
      el.textContent = text;
      return el.innerHTML;
    }
  </script>
</body>
</html>
