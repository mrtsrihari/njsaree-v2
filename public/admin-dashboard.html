<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | NJ Saree Drapist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A227; --gold-light: #E2C561; --gold-dark: #A68518;
      --ivory: #FAF7F2; --black: #1A1A1A; --black-light: #2D2D2D;
      --white: #FFFFFF; --text-secondary: #6B6B6B; --text-light: #999;
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'Poppins', sans-serif;
      --radius: 16px; --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); background: var(--ivory); color: var(--black); min-height: 100vh; }

    /* Header */
    .dash-header {
      background: var(--black); padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.15);
    }
    .dash-brand { display: flex; align-items: baseline; gap: 12px; }
    .dash-brand-name { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700; color: var(--gold); }
    .dash-brand-tag { font-size: 0.68rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }
    .dash-actions { display: flex; gap: 12px; align-items: center; }
    .dash-link { font-size: 0.8rem; color: rgba(255,255,255,0.6); text-decoration: none; transition: color var(--transition); }
    .dash-link:hover { color: var(--gold); }
    .btn-logout { padding: 8px 20px; background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); font-family: var(--font-body); font-size: 0.78rem; border-radius: 50px; cursor: pointer; transition: all var(--transition); }
    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

    /* Tabs */
    .dash-tabs { display: flex; gap: 0; border-bottom: 2px solid rgba(201,162,39,0.12); padding: 0 32px; background: var(--white); }
    .dash-tab { padding: 18px 28px; font-family: var(--font-body); font-size: 0.82rem; font-weight: 500; letter-spacing: 0.5px; color: var(--text-secondary); border: none; background: none; cursor: pointer; border-bottom: 2.5px solid transparent; margin-bottom: -2px; transition: all var(--transition); }
    .dash-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .dash-tab:hover { color: var(--gold-dark); }

    /* Tab Content */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Body */
    .dash-body { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    /* Stats */
    .dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--white); border-radius: var(--radius); padding: 28px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid rgba(201,162,39,0.08); }
    .stat-number { font-family: var(--font-heading); font-size: 2.2rem; font-weight: 700; color: var(--gold); }
    .stat-label { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; letter-spacing: 0.5px; }
    .dash-section-title { font-family: var(--font-heading); font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; color: var(--black); display: flex; align-items: center; gap: 10px; }
    .badge { background: var(--gold); color: var(--black); font-family: var(--font-body); font-size: 0.7rem; font-weight: 600; padding: 3px 10px; border-radius: 50px; }

    /* Review Cards */
    .review-list { margin-bottom: 48px; }
    .admin-review-card { background: var(--white); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid rgba(201,162,39,0.08); display: flex; gap: 20px; align-items: flex-start; transition: all var(--transition); }
    .admin-review-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .review-info { flex: 1; }
    .review-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .review-name { font-weight: 600; font-size: 0.95rem; }
    .review-stars-display { color: var(--gold); font-size: 0.9rem; letter-spacing: 1px; }
    .review-status { font-size: 0.68rem; padding: 3px 10px; border-radius: 50px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
    .status-pending { background: #FFF3CD; color: #856404; }
    .status-approved { background: #D4EDDA; color: #155724; }
    .review-msg { font-size: 0.9rem; color: var(--text-secondary); font-weight: 300; line-height: 1.6; margin-bottom: 8px; font-style: italic; }
    .review-date { font-size: 0.72rem; color: var(--text-light); }
    .review-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-action { padding: 8px 18px; font-family: var(--font-body); font-size: 0.75rem; font-weight: 500; border: none; border-radius: 50px; cursor: pointer; transition: all var(--transition); letter-spacing: 0.5px; }
    .btn-approve { background: #27AE60; color: var(--white); }
    .btn-approve:hover { background: #219A52; transform: translateY(-1px); }
    .btn-delete { background: none; border: 1px solid #E74C3C; color: #E74C3C; }
    .btn-delete:hover { background: #E74C3C; color: var(--white); transform: translateY(-1px); }
    .empty-msg { text-align: center; padding: 40px; color: var(--text-light); font-size: 0.9rem; }

    /* Image Management */
    .upload-section {
      background: var(--white);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 32px;
      border: 1px solid rgba(201,162,39,0.1);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .upload-title { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }
    .upload-form { display: grid; grid-template-columns: 1fr 1fr auto; gap: 16px; align-items: end; }
    .upload-form-group label { display: block; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.5px; margin-bottom: 8px; color: var(--black); }
    .upload-form-group input[type="file"],
    .upload-form-group input[type="text"] {
      width: 100%; padding: 12px 16px;
      background: var(--ivory); border: 1.5px solid rgba(201,162,39,0.15);
      border-radius: 10px; font-family: var(--font-body); font-size: 0.88rem;
      color: var(--black); outline: none; transition: border var(--transition);
    }
    .upload-form-group input:focus { border-color: var(--gold); background: var(--white); }
    .btn-upload { padding: 12px 28px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--black); font-family: var(--font-body); font-size: 0.82rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border: none; border-radius: 50px; cursor: pointer; transition: all var(--transition); white-space: nowrap; }
    .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,162,39,0.3); }
    .btn-upload:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Image Grid */
    .images-gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .image-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 3/4;
      background: var(--ivory);
      border: 1px solid rgba(201,162,39,0.1);
    }
    .image-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .image-card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26,26,26,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .image-card:hover .image-card-overlay { opacity: 1; }
    .btn-img-delete { padding: 10px 20px; background: #E74C3C; color: var(--white); border: none; border-radius: 50px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all var(--transition); }
    .btn-img-delete:hover { background: #C0392B; }

    .upload-status { margin-top: 16px; font-size: 0.85rem; font-weight: 500; min-height: 20px; }
    .upload-status.success { color: #27AE60; }
    .upload-status.error { color: #E74C3C; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 28px; border-radius: 12px; font-size: 0.85rem; font-weight: 500; color: var(--white); box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 9999; opacity: 0; transform: translateY(20px); transition: all var(--transition); }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #27AE60; }
    .toast.error { background: #E74C3C; }

    @media (max-width: 768px) {
      .dash-stats { grid-template-columns: 1fr; }
      .admin-review-card { flex-direction: column; }
      .review-actions { align-self: flex-end; }
      .dash-header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
      .upload-form { grid-template-columns: 1fr; }
      .images-gallery { grid-template-columns: repeat(2, 1fr); }
      .dash-tabs { padding: 0 16px; overflow-x: auto; }
    }
  </style>
</head>
<body>

  <header class="dash-header">
    <div class="dash-brand">
      <span class="dash-brand-name">NJ Saree Drapist</span>
      <span class="dash-brand-tag">Admin Dashboard</span>
    </div>
    <div class="dash-actions">
      <a href="/" class="dash-link">← View Site</a>
      <button class="btn-logout" id="btnLogout">Logout</button>
    </div>
  </header>

  <!-- Tabs -->
  <div class="dash-tabs">
    <button class="dash-tab active" data-tab="reviews">Reviews</button>
    <button class="dash-tab" data-tab="images">Bridal Gallery Images</button>
  </div>

  <div class="dash-body">

    <!-- ── Tab: Reviews ── -->
    <div class="tab-panel active" id="tab-reviews">
      <div class="dash-stats">
        <div class="stat-card"><div class="stat-number" id="statPending">0</div><div class="stat-label">Pending Reviews</div></div>
        <div class="stat-card"><div class="stat-number" id="statApproved">0</div><div class="stat-label">Approved</div></div>
        <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Total</div></div>
      </div>

      <div class="dash-section-title">Pending Reviews <span class="badge" id="pendingBadge">0</span></div>
      <div class="review-list" id="pendingList"></div>

      <div class="dash-section-title">All Reviews</div>
      <div class="review-list" id="allReviewsList"></div>
    </div>

    <!-- ── Tab: Images ── -->
    <div class="tab-panel" id="tab-images">
      <div class="upload-section">
        <h3 class="upload-title">Upload Portfolio Image</h3>
        <form id="uploadForm" class="upload-form">
          <div class="upload-form-group">
            <label for="imageCategory">Category</label>
            <select id="imageCategory" name="category" required style="width: 100%; padding: 12px 16px; background: var(--ivory); border: 1.5px solid rgba(201,162,39,0.15); border-radius: 10px; font-family: var(--font-body); font-size: 0.88rem; color: var(--black); outline: none; transition: border var(--transition);">
              <option value="bridal-saree">Bridal Saree</option>
              <option value="lehenga">Lehenga</option>
              <option value="pre-pleated">Pre-Pleated</option>
              <option value="event">Event Styling</option>
            </select>
          </div>
          <div class="upload-form-group">
            <label for="imageFile">Select Image</label>
            <input type="file" id="imageFile" name="image" accept="image/jpeg,image/png,image/webp" required>
          </div>
          <div class="upload-form-group">
            <label for="imageCaption">Caption (optional)</label>
            <input type="text" id="imageCaption" name="caption" placeholder="E.g. Traditional Red Silk" maxlength="80">
          </div>
          <button type="submit" class="btn-upload" id="btnUpload" style="grid-column: 1 / -1; margin-top: 8px;">Upload Image</button>
        </form>
        <div class="upload-status" id="uploadStatus"></div>
      </div>

      <div class="dash-section-title" style="margin-top:8px;">Portfolio Gallery <span class="badge" id="imageBadge">0</span></div>
      
      <!-- Filter buttons for admin -->
      <div class="portfolio-filters" style="display:flex; gap:10px; margin-bottom: 20px; flex-wrap: wrap;">
        <button class="dash-tab active filter-admin-btn" data-filter="all" style="padding: 8px 16px; font-size: 0.8rem; border-radius: 50px; background: var(--white); border: 1px solid var(--gold); cursor: pointer; transition: all 0.2s;">All</button>
        <button class="dash-tab filter-admin-btn" data-filter="bridal-saree" style="padding: 8px 16px; font-size: 0.8rem; border-radius: 50px; background: var(--white); border: 1px solid rgba(201,162,39,0.3); cursor: pointer; transition: all 0.2s;">Bridal Saree</button>
        <button class="dash-tab filter-admin-btn" data-filter="lehenga" style="padding: 8px 16px; font-size: 0.8rem; border-radius: 50px; background: var(--white); border: 1px solid rgba(201,162,39,0.3); cursor: pointer; transition: all 0.2s;">Lehenga</button>
        <button class="dash-tab filter-admin-btn" data-filter="pre-pleated" style="padding: 8px 16px; font-size: 0.8rem; border-radius: 50px; background: var(--white); border: 1px solid rgba(201,162,39,0.3); cursor: pointer; transition: all 0.2s;">Pre-Pleated</button>
        <button class="dash-tab filter-admin-btn" data-filter="event" style="padding: 8px 16px; font-size: 0.8rem; border-radius: 50px; background: var(--white); border: 1px solid rgba(201,162,39,0.3); cursor: pointer; transition: all 0.2s;">Event</button>
      </div>

      <div class="images-gallery" id="imagesGallery">
        <div class="empty-msg" id="imagesEmptyMsg">No images uploaded yet.</div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TOKEN_KEY = 'nj_admin_token';
    function getToken() { return sessionStorage.getItem(TOKEN_KEY); }
    function authHeaders() { return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }; }

    // Auth check
    (async function checkAuth() {
      const token = getToken();
      if (!token) { window.location.href = '/admin'; return; }
      try {
        const res = await fetch('/api/admin/reviews', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!res.ok) { sessionStorage.removeItem(TOKEN_KEY); window.location.href = '/admin'; }
        else { loadReviews(); loadImages(); }
      } catch { window.location.href = '/admin'; }
    })();

    // Tabs
    document.querySelectorAll('.dash-tab:not(.filter-admin-btn)').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.dash-tab:not(.filter-admin-btn)').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Admin Image Filters
    document.querySelectorAll('.filter-admin-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-admin-btn').forEach(b => {
                b.style.borderColor = 'rgba(201,162,39,0.3)';
                b.classList.remove('active');
            });
            btn.style.borderColor = 'var(--gold)';
            btn.classList.add('active');
            
            const filter = btn.dataset.filter;
            const items = document.querySelectorAll('.image-card');
            
            items.forEach(item => {
                if (filter === 'all' || item.dataset.category === filter) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    });

    // Logout
    document.getElementById('btnLogout').addEventListener('click', async () => {
      try { await fetch('/api/admin/logout', { method: 'POST', headers: authHeaders() }); } catch {}
      sessionStorage.removeItem(TOKEN_KEY);
      window.location.href = '/admin';
    });

    // ─── Reviews ───
    async function loadReviews() {
      try {
        const res = await fetch('/api/admin/reviews', { headers: authHeaders() });
        const data = await res.json();
        if (!data.success) return;
        const reviews = data.reviews;
        const pending = reviews.filter(r => !r.approved);
        const approved = reviews.filter(r => r.approved);
        document.getElementById('statPending').textContent = pending.length;
        document.getElementById('statApproved').textContent = approved.length;
        document.getElementById('statTotal').textContent = reviews.length;
        document.getElementById('pendingBadge').textContent = pending.length;
        renderReviews('pendingList', pending, true);
        renderReviews('allReviewsList', reviews, false);
      } catch { showToast('Failed to load reviews', 'error'); }
    }

    function renderReviews(containerId, reviews, showApprove) {
      const container = document.getElementById(containerId);
      if (!reviews.length) { container.innerHTML = '<div class="empty-msg">No reviews to display.</div>'; return; }
      container.innerHTML = reviews.map(r => `
        <div class="admin-review-card" id="review-${r.id}">
          <div class="review-info">
            <div class="review-meta">
              <span class="review-name">${escapeHtml(r.name)}</span>
              <span class="review-stars-display">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
              <span class="review-status ${r.approved ? 'status-approved' : 'status-pending'}">${r.approved ? 'Approved' : 'Pending'}</span>
            </div>
            <p class="review-msg">"${escapeHtml(r.message)}"</p>
            <div class="review-date">${new Date(r.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}</div>
          </div>
          <div class="review-actions">
            ${!r.approved ? `<button class="btn-action btn-approve" onclick="approveReview(${r.id})">✓ Approve</button>` : ''}
            <button class="btn-action btn-delete" onclick="deleteReview(${r.id})">✕ Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function approveReview(id) {
      const res = await fetch(`/api/admin/reviews/${id}/approve`, { method: 'POST', headers: authHeaders() });
      const data = await res.json();
      if (data.success) { showToast('Review approved ✓', 'success'); loadReviews(); }
      else showToast('Failed to approve', 'error');
    }

    async function deleteReview(id) {
      if (!confirm('Delete this review?')) return;
      const res = await fetch(`/api/admin/reviews/${id}`, { method: 'DELETE', headers: authHeaders() });
      const data = await res.json();
      if (data.success) { showToast('Review deleted', 'success'); loadReviews(); }
      else showToast('Failed to delete', 'error');
    }

    // ─── Images ───
    async function loadImages() {
      try {
        const res = await fetch('/api/portfolio');
        const data = await res.json();
        if (!data.success) return;
        const images = data.images;
        document.getElementById('imageBadge').textContent = images.length;
        const gallery = document.getElementById('imagesGallery');
        const emptyMsg = document.getElementById('imagesEmptyMsg');
        if (!images.length) {
          gallery.innerHTML = '<div class="empty-msg" id="imagesEmptyMsg">No images uploaded yet.</div>';
          return;
        }
        
        const formatCategory = (cat) => {
            const map = { 'bridal-saree': 'Bridal Saree', 'lehenga': 'Lehenga', 'pre-pleated': 'Pre-Pleated', 'event': 'Event' };
            return map[cat] || cat;
        };

        gallery.innerHTML = images.map(img => `
          <div class="image-card" id="img-${img.id}" data-category="${img.category}">
            <img src="${escapeHtml(img.url)}" alt="${escapeHtml(img.caption || 'Bridal image')}" loading="lazy">
            <div style="position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); color:white; padding:4px 8px; border-radius:4px; font-size:0.7rem; font-weight:500;">
                ${escapeHtml(formatCategory(img.category))}
            </div>
            <div class="image-card-overlay">
              <button class="btn-img-delete" onclick="deleteImage(${img.id})">Delete</button>
            </div>
          </div>
        `).join('');
        
        // Re-apply current filter
        const activeFilterBtn = document.querySelector('.filter-admin-btn.active');
        if (activeFilterBtn) activeFilterBtn.click();
        
      } catch { showToast('Failed to load images', 'error'); }
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fileInput = document.getElementById('imageFile');
      const captionInput = document.getElementById('imageCaption');
      const categoryInput = document.getElementById('imageCategory');
      const statusEl = document.getElementById('uploadStatus');
      const btn = document.getElementById('btnUpload');

      if (!fileInput.files.length) { statusEl.textContent = 'Please select an image.'; statusEl.className = 'upload-status error'; return; }

      const formData = new FormData();
      formData.append('image', fileInput.files[0]);
      formData.append('caption', captionInput.value.trim());
      formData.append('category', categoryInput.value);

      btn.disabled = true;
      btn.textContent = 'Uploading...';
      statusEl.textContent = '';

      try {
        const res = await fetch('/api/portfolio/upload', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + getToken() },
          body: formData
        });
        const data = await res.json();
        if (data.success) {
          statusEl.textContent = '✓ Image uploaded successfully!';
          statusEl.className = 'upload-status success';
          fileInput.value = '';
          captionInput.value = '';
          loadImages();
          showToast('Image uploaded!', 'success');
        } else {
          statusEl.textContent = data.error || 'Upload failed.';
          statusEl.className = 'upload-status error';
        }
      } catch {
        statusEl.textContent = 'Network error. Please try again.';
        statusEl.className = 'upload-status error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Upload Image';
      }
    });

    async function deleteImage(id) {
      if (!confirm('Delete this image?')) return;
      try {
        const res = await fetch(`/api/portfolio/${id}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        const data = await res.json();
        if (data.success) { showToast('Image deleted', 'success'); loadImages(); }
        else showToast('Failed to delete', 'error');
      } catch { showToast('Network error', 'error'); }
    }

    // ─── Toast ───
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      setTimeout(() => t.classList.add('show'), 10);
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function escapeHtml(text) {
      const el = document.createElement('span');
      el.textContent = text;
      return el.innerHTML;
    }
  </script>
</body>
</html>
